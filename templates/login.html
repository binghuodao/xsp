<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sign In - XSP Options Monitor</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; background: #0d1117; color: #c9d1d9; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .card { background: #161b22; border: 1px solid #30364d; border-radius: 12px; padding: 48px 40px; text-align: center; max-width: 400px; width: 90%; }
        .card h1 { font-size: 22px; margin-bottom: 8px; }
        .card p { font-size: 14px; color: #8b949e; margin-bottom: 32px; }
        .btn-google { display: inline-flex; align-items: center; gap: 10px; background: #21262d; border: 1px solid #30364d; color: #c9d1d9; padding: 12px 28px; border-radius: 6px; font-size: 15px; font-weight: 500; text-decoration: none; transition: background .2s; }
        .btn-google:hover { background: #30363d; }
        .btn-google svg { width: 20px; height: 20px; }
        .error { color: #ff7b72; font-size: 13px; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="card">
        <h1>XSP Options Monitor</h1>
        <p>Sign in with your Google account to continue</p>
        <a class="btn-google" href="/auth">
            <svg viewBox="0 0 24 24"><path fill="#4285f4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z"/><path fill="#34a853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#fbbc04" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#ea4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
            Sign in with Google
        </a>
        {% if error %}
        <div class="error">{{ error }}</div>
        {% endif %}
    </div>
</body>
</html>
